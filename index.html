<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Natty's Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Playfair Display', serif;
margin:0;
background:#f5efe6;
}

/* MAIN HEADER */

header{
text-align:center;
padding:30px;
}

header h1{
font-size:4em;
margin:0;
text-shadow:2px 2px 6px rgba(0,0,0,0.3);
}

.secondary-header{
font-size:3em;
margin:10px 0 40px 0;
text-align:center;
text-shadow:2px 2px 6px rgba(0,0,0,0.3);
}

/* MONTH SECTION */

.background-section{
background:#f5efe6;
padding:50px 0;
}

.month-title{
text-align:center;
font-size:2.2em;
margin-bottom:40px;
}

/* SCRAPBOOK GRID */

.scrapbook{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
width:80%;
margin:auto;
}

/* POLAROID STYLE */

.polaroid{
background:white;
padding:15px 15px 40px 15px;
box-shadow:0 8px 15px rgba(0,0,0,0.2);
position:relative;
text-align:center;
}

.polaroid img{
width:100%;
height:200px;
object-fit:cover;
}

.polaroid p{
margin-top:10px;
font-size:0.9em;
}

.tape{
width:60px;
height:20px;
background:#f4e4bc;
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%) rotate(-5deg);
opacity:0.8;
}

/* UPLOAD SECTION */

.upload-section{
background:white;
padding:30px;
margin:40px auto;
width:60%;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
border-radius:10px;
}

.upload-section textarea{
width:80%;
height:80px;
}

.upload-section input{
padding:8px;
}

.upload-section button{
padding:10px 20px;
font-family:'Playfair Display', serif;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Natty's Diary</h1>
</header>

<h1 class="secondary-header">Highlights of 2026</h1>

<!-- Upload New Entry -->

<div class="upload-section">

<h2>Add New Diary Entry</h2>

<input type="text" id="monthInput" placeholder="Enter Month">

<br><br>

<input type="file" id="photoUpload" multiple accept="image/*">

<br><br>

<textarea id="captionInput" placeholder="Write captions separated by |"></textarea>

<br><br>

<button onclick="addEntry()">Add Entry</button>

</div>


<!-- Example Month -->

<div class="background-section">

<h2 class="month-title">January</h2>

<div class="scrapbook">

<div class="polaroid">
<div class="tape"></div>
<img src="photo1.jpg">
<p>New year dinner</p>
</div>

<div class="polaroid">
<div class="tape"></div>
<img src="photo2.jpg">
<p>Church fellowship</p>
</div>

<div class="polaroid">
<div class="tape"></div>
<img src="photo3.jpg">
<p>Coffee with hubby</p>
</div>

<div class="polaroid">
<div class="tape"></div>
<img src="photo4.jpg">
<p>Cosmo sleeping</p>
</div>

<div class="polaroid">
<div class="tape"></div>
<img src="photo5.jpg">
<p>Evening walk</p>
</div>

<div class="polaroid">
<div class="tape"></div>
<img src="photo6.jpg">
<p>Sunset moment</p>
</div>

</div>
</div>


<script>

function addEntry(){

let month=document.getElementById("monthInput").value;
let photos=document.getElementById("photoUpload").files;
let captions=document.getElementById("captionInput").value.split("|");

let section=document.createElement("div");
section.className="background-section";

let html=`<h2 class="month-title">${month}</h2>
<div class="scrapbook">`;

for(let i=0;i<photos.length;i++){

let imgURL=URL.createObjectURL(photos[i]);
let caption=captions[i] || "";

html+=`
<div class="polaroid">
<div class="tape"></div>
<img src="${imgURL}">
<p>${caption}</p>
</div>
`;

}

html+=`</div>`;

section.innerHTML=html;

document.body.appendChild(section);

}

</script>

</body>
</html>
